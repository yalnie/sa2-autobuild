name: Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-arm-none-eabi gcc-arm-none-eabi libpng-dev xorg-dev libsdl2-dev g++-mingw-w64 gcc-mingw-w64 libarchive-tools

      - name: Configure SDL2 dependency
        run: |
          mkdir -p ext
          curl -L -o sdl2.zip https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-devel-2.30.3-mingw.zip
          unzip sdl2.zip -d ext_extract
          cp -r ext_extract/SDL2-2.30.3/* ext/
          rm -rf sdl2.zip ext_extract

      - name: Compile SDL2.dll
        run: make SDL2.dll -j$(nproc)

      - name: Compile Windows Executable
        run: make sdl_win32 -j$(nproc)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sa2-windows-x64
          path: |
            sa2.sdl_win32.exe
            SDL2.dll
